<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Portal Ditutup</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;500&display=swap');

body{
    margin:0;
    background:#0e0e0e;
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:500px;
    padding:40px;

.btn{

    margin-top:25px;
    padding:12px 24px;

    transition:0.3s;

.btn-outline{

.footer{
